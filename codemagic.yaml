workflows:
  react-native-android:
    name: My Scientific Calculator Android App
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 18.20.0
      vars:
        CI: "1"
        EXPO_NO_TELEMETRY: "1"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Fix App Config and Prebuild Android
        script: |
          node -e '
          const fs = require("fs");
          if (fs.existsSync("app.json")) {
            let cfg = JSON.parse(fs.readFileSync("app.json", "utf8"));
            if (cfg.expo) {
              delete cfg.expo.icon;
              delete cfg.expo.splash;
              if (cfg.expo.android) {
                delete cfg.expo.android.adaptiveIcon;
                cfg.expo.android.package = "com.mohil.scientificcalculator";
              } else {
                cfg.expo.android = { package: "com.mohil.scientificcalculator" };
              }
            }
            fs.writeFileSync("app.json", JSON.stringify(cfg, null, 2));
          }
          '
          npx expo prebuild --platform android --clean
      - name: Bundle Offline JavaScript
        script: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/ || npx react-native bundle --platform android --dev false --entry-file App.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
