workflows:
  react-native-android:
    name: My Scientific Calculator Android App
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 18.20.0
      vars:
        CI: "1"
        EXPO_NO_TELEMETRY: "1"
        REACT_NATIVE_MAX_WORKERS: "2"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Export Expo Bundle & Prebuild
        script: |
          npx expo export --platform android || true
          npx expo prebuild --platform android --no-install || true
          if [ ! -d "android" ]; then
            echo "Creating fallback android directory..."
            npx @react-native-community/cli init TempApp --template react-native-template-typescript --skip-install
            cp -r TempApp/android ./
            rm -rf TempApp
          fi
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x test
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
