workflows:
  react-native-android:
    name: My Scientific Calculator Android App
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      java: 17
      node: 18.20.0
      vars:
        CI: "1"
        EXPO_NO_TELEMETRY: "1"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Generate Bare Android Project
        script: |
          npx expo prebuild --platform android --template bare-minimum --no-install || true
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
